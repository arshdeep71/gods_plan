name: gods_plan
description: "God's Plan - A Personal Life Operating System backed by Supabase."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Backend and Cloud Sync
  supabase_flutter: ^2.6.0

  # Local Caching / NoSQL Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.4.0
  sqflite_common_ffi: ^2.4.2
  sqflite_common_ffi_web: ^1.1.2
  path: ^1.9.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# Configure launcher icons for iOS (1:1 ratio square logo)
flutter_launcher_icons:
  android: false
  ios: true
  image_path: "assets/app_logo_1.jpg"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/app_logo_1.jpg
    - assets/app_logo_2.jpg
