name: gods_plan
description: "God's Plan - A Personal Life Operating System backed by Supabase."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Backend and Cloud Sync
  supabase_flutter: ^2.6.0

  # Local Caching / NoSQL Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.4.0
  sqflite_common_ffi: ^2.4.2
  sqflite_common_ffi_web: ^1.1.2
  path: ^1.9.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  cupertino_icons: ^1.0.6
  file_picker: ^8.1.2
  url_launcher: ^6.3.0

  # Notifications & Scheduling
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.3

  # App Icon Manager
  flutter_dynamic_icon_plus: ^1.4.1
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# Configure launcher icons for iOS (1:1 ratio square logo)
flutter_launcher_icons:
  android: false
  ios: true
  image_path: "assets/alternate_icons/img1.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/alternate_icons/
    - assets/alternate_icons/thumbnails/
    - assets/alternate_icons_manifest.json
