name: Build iOS IPA

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
 build-ios:
   name: Build iOS App
   runs-on: macos-14
   timeout-minutes: 60

   steps:
     - name: Checkout repository
       uses: actions/checkout@v4
       with:
         submodules: false

     - name: Set up Flutter
       uses: subosito/flutter-action@v2
       with:
         channel: 'stable'
         cache: true

     - name: Generate App Icon Manifest & Thumbnails
       run: |
         python3 -m venv .venv
         source .venv/bin/activate
         python -m pip install --upgrade pip --quiet
         python -m pip install Pillow --quiet
         python generate_app_icon_manifest.py

     - name: Ensure iOS project exists
       run: |
         if [ ! -d "ios" ]; then
           flutter create --org com.godsplan --project-name gods_plan .
         fi

     - name: Install Dependencies
       run: flutter pub get

     - name: Generate iOS Configuration (Podfile & workspace)
       run: flutter build ios --config-only --no-codesign

     - name: Patch iOS Info.plist for alternate icons
       run: python3 patch_ios_plist.py

     - name: Disable iOS Code Signing
       run: python3 disable_ios_signing.py

     - name: Build iOS App (Unsigned)
       run: |
         flutter build ios --release --no-codesign > build_output.log 2>&1 || (tail -n 100 build_output.log && exit 1)

     - name: Upload Build Log on Failure
       if: failure()
       uses: actions/upload-artifact@v4
       with:
         name: build-log
         path: build_output.log

     - name: Commit build log on failure
       if: failure()
       run: |
         git config --global user.name "github-actions[bot]"
         git config --global user.email "github-actions[bot]@users.noreply.github.com"
         if [ -f build_output.log ]; then cp build_output.log build_error.txt; fi
         git add build_error.txt
         git commit -m "chore: add build log [skip ci]" || true
         git push || true

     - name: Create IPA for Sideloading
       run: |
         mkdir -p Payload
         mv build/ios/iphoneos/Runner.app Payload/
         zip -qr app.ipa Payload

     - name: Upload IPA Artifact
       uses: actions/upload-artifact@v4
       with:
         name: iptv-ios-app
         path: app.ipa
