name: Build iOS IPA

on:
 push:
   branches:
     - main
     - master
 workflow_dispatch:

jobs:
 build-ios:
   name: Build iOS App
   runs-on: macos-14
   timeout-minutes: 60

   steps:
     - name: Checkout repository
       uses: actions/checkout@v4
       with:
         submodules: false

     - name: Set up Flutter
       uses: subosito/flutter-action@v2
       with:
         channel: 'stable'
         cache: true

     - name: Create Flutter Project Templates (for no-ios repos)
       run: |
         if [ ! -d "ios" ]; then
           flutter create --org com.godsplan --project-name gods_plan .
         fi

     - name: Install Dependencies
       run: flutter pub get

     - name: Generate iOS Podfile
       run: flutter build ios --config-only --no-codesign

     - name: Install CocoaPods
       run: |
         cd ios
         pod install --repo-update
         cd ..

     - name: Build iOS App (Unsigned)
       run: flutter build ios --release --no-codesign

     - name: Create IPA for Sideloading
       run: |
         mkdir -p Payload
         mv build/ios/iphoneos/Runner.app Payload/
         zip -qr app.ipa Payload

     - name: Upload IPA Artifact
       uses: actions/upload-artifact@v4
       with:
         name: iptv-ios-app
         path: app.ipa
