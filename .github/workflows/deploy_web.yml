name: Deploy Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install Flutter 🛠️
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Configure Web platform 🌐
        run: flutter create . --platforms web

      - name: Install Dependencies 📦
        run: flutter pub get

      - name: Setup SQLite Web binaries 🗄️
        run: dart run sqflite_common_ffi_web:setup --force

      - name: Patch sqflite_sw.js with defensive error handling 🛡️
        run: |
          if [ -f web/sqflite_sw.js ]; then
            echo "self.addEventListener('error', function(e) { console.error('Sqflite SW error:', e.error || e.message); e.preventDefault(); }); self.addEventListener('unhandledrejection', function(e) { console.error('Sqflite SW rejection:', e.reason); e.preventDefault(); });" > temp_sw.js
            cat web/sqflite_sw.js >> temp_sw.js
            mv temp_sw.js web/sqflite_sw.js
            echo "Successfully patched web/sqflite_sw.js"
          else
            echo "web/sqflite_sw.js not found!"
          fi

      - name: Build Web 🚀
        run: flutter build web --base-href "/gods_plan/"

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
